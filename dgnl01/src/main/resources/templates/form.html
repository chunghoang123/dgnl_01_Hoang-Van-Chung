<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Form Tác phẩm</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .error { color: red; font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="container mt-4">
  <h1>Tác phẩm</h1>

  <form th:action="@{${formAction}}" th:object="${artwork}" method="post">

    <div class="mb-3">
      <label class="form-label">Tên tác phẩm</label>
      <input type="text" th:field="*{title}" class="form-control">
      <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
    </div>

    <div class="mb-3">
      <label class="form-label">Họa sĩ</label>
      <input type="text" th:field="*{artist}" class="form-control">
      <div class="error" th:if="${#fields.hasErrors('artist')}" th:errors="*{artist}"></div>
    </div>

    <div class="mb-3">
      <label class="form-label">Ngày sáng tác</label>
      <input type="date" th:field="*{date}" class="form-control">
      <div class="error" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
    </div>

    <button type="submit" class="btn btn-primary">Lưu</button>
    <a th:href="@{/artworks}" class="btn btn-secondary">Quay lại</a>
  </form>
</div>
</body>
</html>
