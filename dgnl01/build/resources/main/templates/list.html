<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tác phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Quản lý Tác phẩm Nghệ thuật</h1>

    <div class="row mb-3">
        <div class="col-md-8">
            <form th:action="@{/artworks}" method="get" class="d-flex">
                <input type="text" name="keyword" class="form-control me-2"
                       placeholder="Tìm theo tên tác phẩm hoặc họa sĩ"
                       th:value="${keyword}">
                <button type="submit" class="btn btn-primary">Tìm kiếm</button>
            </form>
        </div>
        <div class="col-md-4 text-end">
            <a th:href="@{/artworks/new}" class="btn btn-success">Thêm mới</a>
        </div>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Tên tác phẩm</th>
            <th>Họa sĩ</th>
            <th>Ngày sáng tác</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${artworkPage.empty}">
            <td colspan="5" class="text-center">Hiện chưa có tác phẩm nào trong triển lãm</td>
        </tr>
        <tr th:each="artwork : ${artworkPage.content}">
            <td th:text="${artwork.id}"></td>
            <td th:text="${artwork.title}"></td>
            <td th:text="${artwork.artist}"></td>
            <td th:text="${#temporals.format(artwork.date, 'dd/MM/yyyy')}"></td>
            <td>
                <a th:href="@{'/artworks/edit/' + ${artwork.id}}" class="btn btn-warning btn-sm">Sửa</a>
                <form th:action="@{'/artworks/delete/' + ${artwork.id}}" method="post"
                      style="display:inline"
                      onsubmit="return confirm('Bạn có chắc chắn muốn xóa?');">
                    <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
